sca_rules: []

cves:
  - id: VULN_SUDO_CVE_2025_32463
    cve: CVE-2025-32463
    title: Sudo chroot option local privilege escalation
    description_ru: Уязвимость sudo позволяет локальному пользователю повысить привилегии при уязвимой версии пакета.
    impact_ru: Локальное повышение привилегий до root на затронутом хосте.
    remediation_ru: Update sudo to the fixed Ubuntu 24.04 package version or later.
    verification_command: dpkg-query -W -f='${Version}\n' sudo
    expected_result: Установленная версия sudo соответствует исправленной версии дистрибутива или новее.
    references:
      - https://www.sudo.ws/security/advisories/
