---
- name: Bootstrap all virtual machines
  hosts: all
  become: true
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  pre_tasks:
    - name: Ensure Python and apt bindings are available
      ansible.builtin.raw: |
        test -x /usr/bin/python3 || (apt-get update -y && apt-get install -y python3 python3-apt)
      changed_when: false

    - name: Gather facts after Python bootstrap
      ansible.builtin.setup:

    - name: Refresh apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

  roles:
    - role: common
