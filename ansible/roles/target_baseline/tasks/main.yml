---
- name: Create directories for baseline assets
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ project_root_on_target }}/profiles"
    - /etc/ib-host-audit-poc

- name: Deploy profile files to target hosts
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../profiles/{{ item }}"
    dest: "{{ project_root_on_target }}/profiles/{{ item | basename }}"
    mode: "0644"
  loop:
    - host-baseline-v1.yml
    - allowed-software.yml

- name: Deploy demo application configuration
  ansible.builtin.copy:
    src: demo-app.conf
    dest: /etc/ib-host-audit-poc/demo-app.conf
    owner: root
    group: root
    mode: "0644"

- name: Install packages required in both baseline modes
  ansible.builtin.apt:
    name:
      - ufw
      - rsyslog
    state: present
    update_cache: true

- name: Install audit and time sync packages in compliant mode
  ansible.builtin.apt:
    name:
      - auditd
      - systemd-timesyncd
    state: present
  when: target_baseline_apply_remediation

- name: Remove audit package in drift mode
  ansible.builtin.apt:
    name:
      - auditd
    state: absent
    purge: true
  when: not target_baseline_apply_remediation

- name: Remove forbidden packages when remediation mode is enabled
  ansible.builtin.apt:
    name: "{{ target_baseline_forbidden_packages }}"
    state: absent
    purge: true
  when: target_baseline_apply_remediation

- name: Install host-specific drift package set
  ansible.builtin.apt:
    name: "{{ target_baseline_drift_packages[inventory_hostname] | default([]) }}"
    state: present
  when: not target_baseline_apply_remediation

- name: Configure drift or compliant SSH settings
  ansible.builtin.copy:
    dest: "{{ target_baseline_ssh_override_path }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by target_baseline role
      PermitRootLogin {{ 'no' if target_baseline_apply_remediation else 'yes' }}
      PasswordAuthentication {{ 'no' if target_baseline_apply_remediation else 'yes' }}
      PermitEmptyPasswords {{ 'no' if target_baseline_apply_remediation else 'yes' }}
      X11Forwarding {{ 'no' if target_baseline_apply_remediation else 'yes' }}
      MaxAuthTries {{ '4' if target_baseline_apply_remediation else '6' }}
  notify: Restart ssh

- name: Allow SSH through UFW before enabling the firewall
  ansible.builtin.command:
    cmd: ufw allow OpenSSH
  when: target_baseline_apply_remediation
  changed_when: false

- name: Set UFW default deny incoming policy in compliant mode
  ansible.builtin.command:
    cmd: ufw default deny incoming
  when: target_baseline_apply_remediation
  changed_when: false

- name: Ensure UFW state matches the requested baseline mode
  ansible.builtin.command:
    cmd: "{{ 'ufw --force enable' if target_baseline_apply_remediation else 'ufw disable' }}"
  register: target_baseline_ufw_command
  changed_when: "'Firewall is active' in target_baseline_ufw_command.stdout or 'Firewall stopped' in target_baseline_ufw_command.stdout"

- name: Ensure auditd service is enabled and running in compliant mode
  ansible.builtin.systemd:
    name: auditd
    enabled: true
    state: started
  when: target_baseline_apply_remediation

- name: Ensure rsyslog service is enabled and running
  ansible.builtin.systemd:
    name: rsyslog
    enabled: true
    state: started

- name: Ensure time synchronization is enabled in compliant mode
  ansible.builtin.systemd:
    name: systemd-timesyncd
    enabled: true
    state: started
  when: target_baseline_apply_remediation

- name: Create sensitive file for SCA checks
  ansible.builtin.copy:
    dest: "{{ target_baseline_sensitive_file }}"
    content: |
      DEMO_SECRET=replace-me
      PURPOSE=Used to validate permissions checks in the PoC
    owner: root
    group: root
    mode: "{{ target_baseline_sensitive_mode_compliant if target_baseline_apply_remediation else target_baseline_sensitive_mode_drift[inventory_hostname] }}"
