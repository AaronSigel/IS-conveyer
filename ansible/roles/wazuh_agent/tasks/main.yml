---
- name: Install packages required for Wazuh repository
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
      - apt-transport-https
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install Wazuh apt signing key
  ansible.builtin.shell: |
    set -euo pipefail
    curl -s https://packages.wazuh.com/key/GPG-KEY-WAZUH | \
      gpg --no-default-keyring --keyring gnupg-ring:{{ wazuh_agent_gpg_keyring }} --import
    chmod 644 {{ wazuh_agent_gpg_keyring }}
  args:
    creates: "{{ wazuh_agent_gpg_keyring }}"
    executable: /bin/bash

- name: Configure Wazuh apt repository
  ansible.builtin.copy:
    dest: "{{ wazuh_agent_repo_file }}"
    owner: root
    group: root
    mode: "0644"
    content: "{{ wazuh_packages_repo_apt }}\n"

- name: Update apt cache after adding Wazuh repository
  ansible.builtin.apt:
    update_cache: true

- name: Install Wazuh agent package
  ansible.builtin.apt:
    name: wazuh-agent
    state: "{{ wazuh_agent_package_state }}"
  environment:
    WAZUH_MANAGER: "{{ wazuh_agent_manager_ip }}"
    WAZUH_AGENT_NAME: "{{ inventory_hostname }}"

- name: Ensure the agent is enrolled on the manager and read its key
  ansible.builtin.shell: |
    set -euo pipefail

    agent_name='{{ inventory_hostname }}'
    agent_ip='{{ hostvars[inventory_hostname].vm_private_ip | default(ansible_host | default(inventory_hostname)) }}'
    changed=0

    find_agent_id() {
      /var/ossec/bin/manage_agents -l | awk -v expected_name="$agent_name" -v expected_ip="$agent_ip" '
        /ID: [0-9]+, Name: / {
          line = $0
          id = name = ip = ""

          if (match($0, /ID: [0-9]+/)) {
            id = substr($0, RSTART + 4, RLENGTH - 4)
          }
          if (match(line, /Name: [^,]+, IP:/)) {
            name = substr(line, RSTART + 6, RLENGTH - 11)
          }
          if (match(line, /IP: [^, ]+/)) {
            ip = substr(line, RSTART + 4, RLENGTH - 4)
          }

          if (id != "" && name == expected_name && ip == expected_ip) {
            print id
            exit 0
          }
        }
      '
    }

    find_stale_ids() {
      /var/ossec/bin/manage_agents -l | awk -v expected_name="$agent_name" -v expected_ip="$agent_ip" '
        /ID: [0-9]+, Name: / {
          line = $0
          id = name = ip = ""

          if (match($0, /ID: [0-9]+/)) {
            id = substr($0, RSTART + 4, RLENGTH - 4)
          }
          if (match(line, /Name: [^,]+, IP:/)) {
            name = substr(line, RSTART + 6, RLENGTH - 11)
          }
          if (match(line, /IP: [^, ]+/)) {
            ip = substr(line, RSTART + 4, RLENGTH - 4)
          }

          if (id != "" && (name == expected_name || ip == expected_ip) && !(name == expected_name && ip == expected_ip)) {
            print id
          }
        }
      '
    }

    agent_id="$(find_agent_id || true)"

    if [ -z "$agent_id" ]; then
      stale_ids="$(find_stale_ids || true)"

      if [ -n "$stale_ids" ]; then
        while IFS= read -r stale_id; do
          [ -n "$stale_id" ] || continue
          /var/ossec/bin/manage_agents -r "$stale_id" >/dev/null
        done <<< "$stale_ids"
        changed=1
      fi

      /var/ossec/bin/manage_agents -a "$agent_ip" -n "$agent_name" >/dev/null
      changed=1

      for _ in $(seq 1 10); do
        agent_id="$(find_agent_id || true)"
        [ -n "$agent_id" ] && break
        sleep 1
      done
    fi

    if [ -z "$agent_id" ]; then
      echo "Unable to find Wazuh agent ID for ${agent_name} (${agent_ip}) after enrollment." >&2
      /var/ossec/bin/manage_agents -l >&2
      exit 1
    fi

    if [ "$changed" -eq 1 ]; then
      echo "changed" >&2
    fi

    /var/ossec/bin/manage_agents -e "$agent_id"
  args:
    executable: /bin/bash
  throttle: 1
  delegate_to: "{{ groups['wazuh'][0] }}"
  become: true
  register: wazuh_agent_key_line
  changed_when: "'changed' in wazuh_agent_key_line.stderr"

- name: Fail if the manager does not have an enrolled key for the agent
  ansible.builtin.assert:
    that:
      - wazuh_agent_key_line.stdout | length > 0
    fail_msg: "No enrolled agent key was found on the manager for {{ inventory_hostname }}"

- name: Extract encoded agent key from manager response
  ansible.builtin.set_fact:
    wazuh_agent_import_key: "{{ wazuh_agent_key_line.stdout | regex_search('(?m)^[A-Za-z0-9+/=]+$') | default('') }}"

- name: Fail if the manager output does not contain an encoded agent key
  ansible.builtin.assert:
    that:
      - wazuh_agent_import_key | length > 0
    fail_msg: "Unable to extract encoded agent key for {{ inventory_hostname }} from manage_agents output"

- name: Import the enrolled agent key locally
  ansible.builtin.shell: |
    set -euo pipefail

    expected_line="$(printf '%s' '{{ wazuh_agent_import_key }}' | base64 -d)"
    current_line="$(tail -n 1 /var/ossec/etc/client.keys 2>/dev/null || true)"
    current_lines="$(wc -l < /var/ossec/etc/client.keys 2>/dev/null || echo 0)"

    if [ "${current_line}" = "${expected_line}" ] && [ "${current_lines}" -eq 1 ]; then
      exit 0
    fi

    rm -f /var/ossec/etc/client.keys
    printf 'y\n' | /var/ossec/bin/manage_agents -i '{{ wazuh_agent_import_key }}' >/dev/null
    chown root:wazuh /var/ossec/etc/client.keys
    chmod 0640 /var/ossec/etc/client.keys
    echo "changed"
  args:
    executable: /bin/bash
  register: wazuh_agent_key_import
  changed_when: "'changed' in wazuh_agent_key_import.stdout"
  notify: Restart Wazuh agent

- name: Ensure local shared configuration directory exists on the agent
  ansible.builtin.file:
    path: "{{ wazuh_agent_shared_dir }}"
    state: directory
    owner: root
    group: wazuh
    mode: "{{ wazuh_agent_shared_dir_mode }}"

- name: Allow remote command execution for CIS SCA checks
  ansible.builtin.lineinfile:
    path: "{{ wazuh_agent_local_internal_options_path }}"
    regexp: '^sca\.remote_commands='
    line: 'sca.remote_commands=1'
    owner: root
    group: wazuh
    mode: "0640"
    create: true
  notify: Restart Wazuh agent

- name: Disable agent-side syscheck for the lightweight PoC profile
  ansible.builtin.replace:
    path: /var/ossec/etc/ossec.conf
    regexp: '(<syscheck>\s*<disabled>)no(</disabled>)'
    replace: '\1yes\2'
  notify: Restart Wazuh agent

- name: Inject local Wazuh config block for fast SCA and inventory scans
  ansible.builtin.blockinfile:
    path: /var/ossec/etc/ossec.conf
    marker: "<!-- {mark} {{ wazuh_agent_local_config_block_marker }} -->"
    insertbefore: "</ossec_config>"
    block: |2
        <wodle name="syscollector">
          <disabled>no</disabled>
          <interval>2m</interval>
          <scan_on_start>yes</scan_on_start>
          <hardware>yes</hardware>
          <os>yes</os>
          <network>yes</network>
          <packages>yes</packages>
          <ports all="yes">yes</ports>
          <processes>yes</processes>
          <users>yes</users>
          <groups>yes</groups>
          <services>yes</services>
          <browser_extensions>yes</browser_extensions>
          <synchronization>
            <max_eps>20</max_eps>
          </synchronization>
        </wodle>
        <sca>
          <enabled>yes</enabled>
          <scan_on_start>yes</scan_on_start>
          <interval>2m</interval>
          <skip_nfs>yes</skip_nfs>
          <policies>
            <policy enabled="yes">{{ sca_policy_relpath }}</policy>
          </policies>
        </sca>
  notify: Restart Wazuh agent

- name: Ensure Wazuh agent service is enabled and started
  ansible.builtin.systemd:
    name: "{{ wazuh_agent_service_name }}"
    enabled: true
    state: started

- name: Wait for agent service port binding
  ansible.builtin.wait_for:
    path: /var/ossec/var/run/wazuh-agentd.state
    timeout: 300

- name: Report current agent service state
  ansible.builtin.command: "systemctl is-active {{ wazuh_agent_service_name }}"
  register: wazuh_agent_service_state
  changed_when: false

- name: Show Wazuh agent service state
  ansible.builtin.debug:
    msg: "Agent {{ inventory_hostname }} service state: {{ wazuh_agent_service_state.stdout }}"
