---
- name: Remove forbidden packages on compliant host
  ansible.builtin.apt:
    name: "{{ forbidden_packages }}"
    state: absent
    purge: true
  when: target_security_state == "compliant"

- name: Install forbidden packages on vulnerable host
  ansible.builtin.apt:
    name: "{{ forbidden_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: target_security_state == "vulnerable"

- name: Install vulnerable package versions on vulnerable host
  ansible.builtin.apt:
    name: "{{ vulnerable_package_versions }}"
    state: present
    allow_downgrade: true
    update_cache: true
    cache_valid_time: 3600
  when:
    - target_security_state == "vulnerable"
    - vulnerable_package_versions | default([]) | length > 0
