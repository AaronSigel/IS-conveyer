---
- name: Set PermitRootLogin in main sshd_config
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: "PermitRootLogin {{ ssh_permit_root_login }}"
    create: false
  notify: Restart ssh

- name: Set PasswordAuthentication in main sshd_config
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: "PasswordAuthentication {{ ssh_password_authentication }}"
    create: false
  notify: Restart ssh

- name: Ensure target-state SSH drop-in is effective
  ansible.builtin.copy:
    dest: "{{ target_baseline_ssh_override_path | default('/etc/ssh/sshd_config.d/99-ib-host-audit-poc.conf') }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by target_state role
      PermitRootLogin {{ ssh_permit_root_login }}
      PasswordAuthentication {{ ssh_password_authentication }}
      PermitEmptyPasswords {{ ssh_permit_empty_passwords }}
      X11Forwarding {{ ssh_x11_forwarding }}
      MaxAuthTries {{ ssh_max_auth_tries }}
  notify: Restart ssh

- name: Align early cloud image SSH password-auth drop-ins with demo state
  ansible.builtin.copy:
    dest: "{{ item }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      PasswordAuthentication {{ ssh_password_authentication }}
  loop:
    - /etc/ssh/sshd_config.d/50-cloud-init.conf
    - /etc/ssh/sshd_config.d/60-cloudimg-settings.conf
  notify: Restart ssh
