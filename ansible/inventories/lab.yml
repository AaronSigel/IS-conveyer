---
all:
  vars:
    ansible_user: vagrant
    ansible_ssh_private_key_file: "{{ lookup('env', 'VAGRANT_INSECURE_PRIVATE_KEY') | default('~/.vagrant.d/insecure_private_key', true) }}"
    ansible_python_interpreter: /usr/bin/python3
  children:
    wazuh:
      hosts:
        wazuh_manager:
          ansible_host: 127.0.0.1
          ansible_port: 2222
          vm_private_ip: 192.168.56.10
    targets:
      hosts:
        target1:
          ansible_host: 127.0.0.1
          ansible_port: 2201
          vm_private_ip: 192.168.56.11
        target2:
          ansible_host: 127.0.0.1
          ansible_port: 2202
          vm_private_ip: 192.168.56.12
