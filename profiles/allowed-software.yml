profile: allowed-software
metadata:
  version: 1
  description: Allowlist of software and services expected in the PoC stand.

allowlist:
  packages:
    - ca-certificates
    - curl
    - openssh-client
    - python3
    - python3-apt
    - vim

  services:
    - ssh
    - systemd-networkd

comments:
  - "Список стартовый и должен расширяться по мере интеграции Wazuh/OpenSCAP/Trivy."
  - "Разрешённое ПО описывается отдельно от denylist, чтобы упростить будущую трансляцию в разные движки."
